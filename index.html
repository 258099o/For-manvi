<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Manvi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital@1&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header class="fade-in">
            <h1 class="name-title">For Manvi</h1>
            <p class="subtitle">Every moment with you is a gift.</p>
        </header>

        <main>
            <div class="heart-box fade-in">
                <div class="heart"></div>
            </div>

            <section class="message-section fade-in">
                <p class="love-text">
                    "I love you very much. You are the most beautiful part of my world, 
                    and I wanted to build this small space just to remind you of that."
                </p>
            </section>

            <div class="interaction fade-in">
                <button id="surpriseBtn">Click for a Surprise</button>
                <p id="hiddenMessage" class="hidden">You make my heart smile every single day. ❤️</p>
            </div>
        </main>

        <footer>
            <p>Always yours.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
